<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Ledger — TravelOps</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Vendor Ledger</h1>
                    <p class="page-subtitle">Running balance owed to each vendor across all bookings</p>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center">
                    <input type="text" id="searchVendors" placeholder="Search vendor..." class="search-input" style="width:220px">
                </div>
            </div>

            <!-- Summary Stats -->
            <div class="stats-grid" style="margin-bottom:1.5rem">
                <div class="stat-card">
                    <div class="stat-value" id="totalBilled">₹0</div>
                    <div class="stat-label">Total Billed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalPaid">₹0</div>
                    <div class="stat-label">Total Paid</div>
                </div>
                <div class="stat-card" style="border-color:var(--danger)">
                    <div class="stat-value" id="totalOutstanding" style="color:var(--danger)">₹0</div>
                    <div class="stat-label">Outstanding Balance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="vendorCount">0</div>
                    <div class="stat-label">Vendors with Balance</div>
                </div>
            </div>

            <!-- Vendor Table -->
            <div class="card">
                <table class="data-table" id="vendorLedgerTable">
                    <thead>
                        <tr>
                            <th>Vendor</th>
                            <th>Category</th>
                            <th>Total Billed</th>
                            <th>Total Paid</th>
                            <th>Balance Due</th>
                            <th>Last Activity</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody">
                        <tr><td colspan="7" class="empty-state">Loading…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Booking Breakdown Drawer -->
            <div class="drawer-overlay hidden" id="ledgerDrawerOverlay"></div>
            <div class="drawer hidden" id="ledgerDrawer">
                <div class="drawer-header">
                    <h3 id="drawerVendorName">Vendor Breakdown</h3>
                    <button class="btn-icon" id="closeLedgerDrawer">✕</button>
                </div>
                <div class="drawer-body" id="ledgerDrawerBody">
                    <p style="color:var(--text-muted)">Loading…</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/vendor-ledger.js"></script>
</body>
</html>
