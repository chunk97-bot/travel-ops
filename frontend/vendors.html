<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Ops — Vendors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">✈</span><span class="logo-text">Travel Ops</span></div>
        <ul class="nav-links">
            <li><a href="index.html"><span>📊</span> Dashboard</a></li>
            <li><a href="leads.html"><span>🎯</span> Leads</a></li>
            <li><a href="clients.html"><span>👥</span> Clients</a></li>
            <li><a href="itinerary.html"><span>🗺</span> Itinerary Builder</a></li>
            <li class="active"><a href="vendors.html"><span>🤝</span> Vendors</a></li>
            <li><a href="invoices.html"><span>🧾</span> Invoices</a></li>
            <li><a href="followups.html"><span>🔔</span> Follow-Ups</a></li>
            <li><a href="reports.html"><span>📈</span> Reports</a></li>
        </ul>
        <div class="sidebar-user" id="sidebarUser"></div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1 class="page-title">Vendor Master</h1>
            <div class="top-bar-right">
                <button class="btn-primary" id="addVendorBtn">+ Add Vendor</button>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Vendor Cards Grid -->
        <div class="vendor-grid" id="vendorGrid">
            <p class="loading">Loading vendors...</p>
        </div>
    </main>

    <!-- Vendor Modal -->
    <div class="modal hidden" id="vendorModal">
        <div class="modal-overlay" id="vendorModalOverlay"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="vendorModalTitle">Add Vendor</h2>
                <button class="modal-close" id="closeVendorModal">✕</button>
            </div>
            <form id="vendorForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Vendor Name *</label>
                        <input type="text" id="vName" required placeholder="e.g. Europamundo">
                    </div>
                    <div class="form-group">
                        <label>Region *</label>
                        <select id="vRegion" required>
                            <option value="">Select region</option>
                            <option>Europe</option><option>USA</option>
                            <option>Asia</option><option>South East Asia</option>
                            <option>Middle East</option><option>Africa</option>
                            <option>Domestic</option><option>Oceania</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" id="vContactName">
                    </div>
                    <div class="form-group">
                        <label>Contact Phone</label>
                        <input type="tel" id="vContactPhone">
                    </div>
                    <div class="form-group">
                        <label>Contact Email</label>
                        <input type="email" id="vContactEmail">
                    </div>
                    <div class="form-group">
                        <label>Commission %</label>
                        <input type="number" id="vCommission" value="15" min="0" max="40">
                    </div>
                    <div class="form-group">
                        <label>Payment Terms</label>
                        <input type="text" id="vPaymentTerms" placeholder="e.g. 30 days credit">
                    </div>
                    <div class="form-group">
                        <label>Contract Valid Until</label>
                        <input type="date" id="vContractUntil">
                    </div>
                    <div class="form-group full-width">
                        <label>Notes</label>
                        <textarea id="vNotes" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelVendorBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Vendor</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Vendor Pricing Modal -->
    <div class="modal hidden" id="pricingModal">
        <div class="modal-overlay" id="pricingModalOverlay"></div>
        <div class="modal-box modal-large">
            <div class="modal-header">
                <h2 id="pricingModalTitle">Pricing — <span id="pricingVendorName"></span></h2>
                <button class="modal-close" id="closePricingModal">✕</button>
            </div>
            <div class="pricing-header">
                <button class="btn-primary" id="addPricingRowBtn">+ Add Destination Price</button>
            </div>
            <table class="data-table" id="pricingTable">
                <thead>
                    <tr>
                        <th>Destination</th><th>Nights</th><th>Category</th>
                        <th>Hotel/Night</th><th>Transfer</th><th>Sightseeing/pax</th>
                        <th>Visa/pax</th><th>Season</th><th>Valid Until</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pricingTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/vendors.js"></script>
</body>
</html>
