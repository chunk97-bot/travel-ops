<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Inquiry — Get a Quote</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #f1f5f9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 12px; }
        .capture-form { background: #1a1d27; border-radius: 12px; padding: 28px; max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .capture-form h2 { font-size: 1.4rem; margin-bottom: 4px; }
        .capture-form p.sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: #12151f; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 12px; color: #f1f5f9; font-size: 0.9rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3b82f6; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; transition: background 0.2s; }
        .btn-submit:hover { background: #2563eb; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-msg { text-align: center; padding: 32px 0; }
        .success-msg h3 { color: #10b981; margin-bottom: 8px; }
        .powered { text-align: center; margin-top: 16px; font-size: 0.75rem; color: #475569; }
    </style>
</head>
<body>
    <div class="capture-form" id="captureForm">
        <h2>✈ Plan Your Dream Trip</h2>
        <p class="sub">Fill in your details and our travel expert will get back to you within 24 hours.</p>
        <form id="leadCaptureForm" onsubmit="submitCapture(event)">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="capName" required placeholder="John Doe">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="capPhone" required placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="capEmail" placeholder="john@example.com">
                </div>
            </div>
            <div class="form-group">
                <label>Where do you want to go? *</label>
                <input type="text" id="capDestination" required placeholder="e.g. Bali, Europe, Maldives">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Travel Date</label>
                    <input type="date" id="capTravelDate">
                </div>
                <div class="form-group">
                    <label>Number of Travellers</label>
                    <input type="number" id="capPax" min="1" value="2" placeholder="2">
                </div>
            </div>
            <div class="form-group">
                <label>Budget Range</label>
                <select id="capBudget">
                    <option value="">Select budget</option>
                    <option value="under1L">Under ₹1 Lakh</option>
                    <option value="1L-3L">₹1L – ₹3L</option>
                    <option value="3L-6L">₹3L – ₹6L</option>
                    <option value="6L-10L">₹6L – ₹10L</option>
                    <option value="10L+">₹10L+</option>
                </select>
            </div>
            <div class="form-group">
                <label>Any special requests?</label>
                <textarea id="capMessage" rows="3" placeholder="Honeymoon, adventure, specific activities..."></textarea>
            </div>
            <button type="submit" class="btn-submit" id="capSubmit">📩 Get Free Quote</button>
        </form>
        <p class="powered">Powered by Travel Ops</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        async function submitCapture(e) {
            e.preventDefault();
            const btn = document.getElementById('capSubmit');

            if (!window.supabase) {
                alert('System error. Please try again later.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            // Sanitize inputs
            const sanitize = (str) => (str || '').replace(/[<>]/g, '').trim();

            const payload = {
                form_id: 'website-main',
                name: sanitize(document.getElementById('capName').value),
                phone: sanitize(document.getElementById('capPhone').value),
                email: sanitize(document.getElementById('capEmail').value) || null,
                destination: sanitize(document.getElementById('capDestination').value),
                travel_date: document.getElementById('capTravelDate').value || null,
                pax: parseInt(document.getElementById('capPax').value) || 2,
                budget: document.getElementById('capBudget').value || null,
                message: sanitize(document.getElementById('capMessage').value) || null,
                source_url: window.location.href,
                utm_source: new URLSearchParams(window.location.search).get('utm_source'),
                utm_medium: new URLSearchParams(window.location.search).get('utm_medium'),
                utm_campaign: new URLSearchParams(window.location.search).get('utm_campaign'),
            };

            try {
                const { error } = await window.supabase.from('lead_captures').insert(payload);
                if (error) throw error;

                document.getElementById('captureForm').innerHTML = `
                    <div class="success-msg">
                        <h3>✅ Thank You!</h3>
                        <p>Your inquiry has been submitted. Our travel expert will contact you within 24 hours.</p>
                        <p style="color:#94a3b8;margin-top:12px;font-size:0.9rem">We'll reach you at ${payload.phone}</p>
                    </div>
                    <p class="powered">Powered by Travel Ops</p>
                `;
            } catch (err) {
                btn.disabled = false;
                btn.textContent = '📩 Get Free Quote';
                alert('Something went wrong. Please try again or call us directly.');
            }
        }
    </script>
</body>
</html>
