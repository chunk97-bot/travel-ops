<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Ops — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-dark); }
        .login-box { background: var(--bg-card); border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; font-size: 2rem; margin-bottom: 8px; }
        .login-title { text-align: center; font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .login-sub { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: 0.9rem; }
        .login-error { background: rgba(239,68,68,0.15); color: #ef4444; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">✈</div>
        <div class="login-title">Travel Ops</div>
        <div class="login-sub">Staff Login</div>
        <div class="login-error" id="loginError"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required placeholder="you@agency.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary full-width" id="loginBtn">Login</button>
        </form>
    </div>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            errEl.style.display = 'none';
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errEl.textContent = error.message;
                errEl.style.display = 'block';
                btn.textContent = 'Login';
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
